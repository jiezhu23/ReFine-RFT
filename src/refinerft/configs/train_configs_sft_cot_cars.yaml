# DataLoader configurations
dataset_name: "laolao77/ViRFT_CLS_car196_4shot" # load from huggingface
# dataset_name: "laolao77/ViRFT_CLS_flower_4_shot" # load from huggingface
# dataset_name: "laolao77/ViRFT_CLS_fgvc_aircraft_4_shot" # load from huggingface
# dataset_name: "laolao77/ViRFT_CLS_pets37_4shot" # load from huggingface

use_cot: true # true for using COT dataset generated by GPT-4o, false for using original dataset
dataset_cache_dir: "./share_data"
workers: 4
prefetch_factor: 2

# Training configurations
model: "Qwen/Qwen2-VL-2B-Instruct"
train_method: "sft"
model_cache_dir: "./share_models/"
output_dir: ${model_cache_dir}
api_url: "http://127.0.0.1:8001/v1"
prompt_type: "cot" # cot or ao (answer-only)
max_pixels: 401408 # (112 * 112)
max_prompt_length: 1024
max_completion_length: ${max_prompt_length}
per_device_train_batch_size: 8
per_device_eval_batch_size : 32
num_train_epochs: 8
max_steps: 200 # if not null, will override num_train_epochs
gradient_accumulation_steps: 2
gradient_checkpointing: false
mixed_precision: false
bf16: true
deepspeed: src/refinerft/configs/zero3.json
eval_steps: 50
eval_delay: 150
save_steps: ${eval_steps}
seed: 42

# LoRA configurations
use_lora: true # if false, will use fully fine-tuning
lora_r: 64
lora_alpha: 128
lora_dropout: 0.0
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
lora_checkpoint: null  # Path to load a specific LoRA checkpoint for evaluation

# Optimizer configurations
learning_rate: 2.0e-5
weight_decay: 0.0
warmup_ratio: 0.0
lr_scheduler_type: "linear"

# Logging configurations
use_wandb: true
wandb_project: "refinerft_fewshotcls"
wandb_run_name: "cars_4_shot-sft-lora-r64a128-cot"
logging_steps: 1

  